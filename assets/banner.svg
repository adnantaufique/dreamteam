<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="dreamteam — independently-verified multi-agent delivery">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular","SF Mono",Menlo,Consolas,"Liberation Mono","DejaVu Sans Mono",monospace; }
    </style>
  </defs>

  <!-- terminal panel -->
  <rect x="8" y="8" width="1184" height="284" rx="18" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- title-bar traffic lights -->
  <circle cx="44" cy="46" r="7" fill="#ff5f56"/>
  <circle cx="68" cy="46" r="7" fill="#ffbd2e"/>
  <circle cx="92" cy="46" r="7" fill="#27c93f"/>
  <text x="1156" y="52" text-anchor="end" class="mono" font-size="18" fill="#6e7681">v1.3.0 · plugin</text>

  <!-- prompt wordmark -->
  <text x="52" y="172" class="mono" font-size="70" font-weight="700">
    <tspan fill="url(#accent)">❯ </tspan><tspan fill="#e6edf3">dreamteam</tspan>
  </text>
  <rect x="490" y="110" width="30" height="62" rx="3" fill="#3fb950">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- tagline -->
  <text x="56" y="222" class="mono" font-size="24" fill="#adbac7">independently-verified multi-agent delivery</text>

  <!-- pillars + platforms -->
  <text x="56" y="258" class="mono" font-size="18" fill="#3fb950">correct<tspan fill="#6e7681"> · </tspan><tspan fill="#8b949e">versatile</tspan><tspan fill="#6e7681"> · </tspan><tspan fill="#8b949e">minimal</tspan></text>
  <text x="1156" y="258" text-anchor="end" class="mono" font-size="18" fill="#6e7681">claude · codex · gemini · codewhale · opencode · cursor</text>
</svg>
